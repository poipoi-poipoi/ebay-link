<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="eBay管理">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>eBay管理へ移動</title>
<style>
  :root { color-scheme: light; }
  html,body { height:100%; margin:0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background:#f5f6f8; color:#1f2933;
    display:flex; align-items:center; justify-content:center;
    padding:24px; box-sizing:border-box;
  }
  .card {
    background:#fff; border:1px solid #e3e6ea; border-radius:16px;
    padding:28px 24px; max-width:420px; width:100%;
    box-shadow:0 6px 24px rgba(0,0,0,.06); text-align:center;
  }
  h1 { font-size:19px; margin:0 0 6px; }
  p  { font-size:14px; line-height:1.6; color:#52616b; margin:10px 0; }
  .spin {
    width:34px; height:34px; margin:6px auto 14px;
    border:4px solid #dfe3e8; border-top-color:#2f80ed;
    border-radius:50%; animation:r 0.9s linear infinite;
  }
  @keyframes r { to { transform:rotate(360deg); } }
  a.btn, button.btn {
    display:inline-block; margin-top:14px; padding:12px 20px;
    background:#2f80ed; color:#fff; border:none; border-radius:10px;
    font-size:15px; font-weight:600; text-decoration:none; cursor:pointer;
    -webkit-appearance:none;
  }
  .muted { font-size:12px; color:#90a0ab; margin-top:16px; }
  .err { color:#c0392b; }
  .hidden { display:none; }
  code { background:#eef1f4; padding:1px 6px; border-radius:5px; font-size:13px; }
</style>
</head>
<body>
  <div class="card">
    <div id="loading">
      <div class="spin"></div>
      <h1>eBay管理ページへ移動中…</h1>
      <p>今の最新アドレスを確認しています。</p>
    </div>

    <div id="ready" class="hidden">
      <h1>準備できました</h1>
      <p>自動で開かない場合は下のボタンを押してください。</p>
      <a id="go" class="btn" href="#">eBay管理ページを開く</a>
    </div>

    <div id="error" class="hidden">
      <h1 class="err">今は繋がりませんでした</h1>
      <p id="errmsg">サーバーが起動中か、アドレスがまだ更新されていない可能性があります。</p>
      <button class="btn" onclick="location.reload()">もう一度ためす</button>
      <p class="muted">それでもダメなら、iPhoneのメールで<br>件名「<code>じーるちゃん url</code>」を自分宛に送ると<br>最新アドレスが返信で届きます。</p>
    </div>

    <div id="nohash" class="hidden">
      <h1 class="err">リンクが不完全です</h1>
      <p>このページは、ホーム画面に追加した専用アイコンから開いてください（アドレスの<code>#</code>以降が必要です）。</p>
    </div>

    <p class="muted">eBay出品管理 スマホ版</p>
  </div>

<script>
(function () {
  function show(id) {
    ["loading","ready","error","nohash"].forEach(function (x) {
      document.getElementById(x).classList.toggle("hidden", x !== id);
    });
  }
  function fail(msg) {
    if (msg) document.getElementById("errmsg").textContent = msg;
    show("error");
  }

  var gid = (location.hash || "").replace(/^#/, "").trim();
  if (!gid || !/^[a-f0-9]{16,40}$/i.test(gid)) { show("nohash"); return; }

  // raw gist(gist.githubusercontent.com)はapi.github.comの60回/時IPレート制限を受けない。
  // まずraw(プレーンテキスト=現URL)を試し、ダメな時だけAPI(JSON)にフォールバックする。
  var raw = "https://gist.githubusercontent.com/poipoi-poipoi/" + gid + "/raw/u?_=" + Date.now();
  var api = "https://api.github.com/gists/" + gid + "?_=" + Date.now();

  function done(url) {
    url = (url || "").trim();
    if (!/^https:\/\/[a-z0-9-]+\.trycloudflare\.com/i.test(url)) {
      throw new Error("no valid url in store");
    }
    document.getElementById("go").href = url;
    show("ready");
    location.replace(url); // 自動遷移（別オリジンへ）
  }

  fetch(raw, { cache: "no-store" })
    .then(function (r) {
      if (!r.ok) throw new Error("raw HTTP " + r.status);
      return r.text();
    })
    .then(done)
    .catch(function () {
      return fetch(api, { cache: "no-store", headers: { "Accept": "application/vnd.github+json" } })
        .then(function (r) {
          if (!r.ok) throw new Error("store HTTP " + r.status);
          return r.json();
        })
        .then(function (d) {
          var files = d && d.files ? d.files : {};
          var name = Object.keys(files)[0];
          done(name ? (files[name].content || "") : "");
        });
    })
    .catch(function () { fail(); });
})();
</script>
</body>
</html>
